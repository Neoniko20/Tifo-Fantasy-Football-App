name: WM Regression

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'lib/wm-*.ts'
      - 'lib/wm/**'
      - 'lib/waiver-processor.ts'
      - 'lib/scoring.ts'
      - 'app/wm/**'
      - 'app/api/wm/**'
      - 'app/api/cron/process-waivers-wm/**'
      - 'app/api/process-waivers-wm/**'
      - '__tests__/**'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/wm-*.ts'
      - 'lib/wm/**'
      - 'lib/waiver-processor.ts'
      - 'lib/scoring.ts'
      - 'app/wm/**'
      - 'app/api/wm/**'
      - 'app/api/cron/process-waivers-wm/**'
      - 'app/api/process-waivers-wm/**'
      - '__tests__/**'

jobs:
  wm-regression:
    name: WM Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
